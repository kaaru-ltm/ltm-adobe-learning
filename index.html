<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LTM Adobe Learning</title>
 
<!-- Web SDK base -->
<script>

!function(n,o){o.forEach(function(o){n[o]||((n.__alloyNS=n.__alloyNS||[]).push(o),n[o]=function(){var u=arguments;return new Promise(function(i,l){n.setTimeout(function(){n[o].q.push([i,l,u])})})},n[o].q=[])})}(window,["alloy"]);
</script>
 
<!-- Web SDK -->
<script src="https://cdn1.adoberesources.net/alloy/2.19.1/alloy.js" async></script>
 
<style>

body { font-family: Arial; padding: 24px; background:#f5f5f5; }

.page { max-width:900px; margin:auto; background:#fff; padding:24px; border-radius:12px; }

#hero-banner { margin-top:20px; padding:24px; border:2px dashed #999; border-radius:12px; min-height:120px; display:flex; align-items:center; justify-content:center; }
</style>
</head>
 
<body>
 
<div class="page">
<h1>LTM Adobe Learning</h1>
<div id="hero-banner">Default Hero Banner</div>
</div>
 
<script>

const surface = "web://kaaru-ltm.github.io/ltm-adobe-learning/#hero-banner";
 
function sendDisplayEvent(proposition) {

  return alloy("sendEvent", {

    xdm: {

      eventType: "decisioning.propositionDisplay",

      _experience: {

        decisioning: {

          propositions: [proposition]

        }

      }

    }

  });

}
 
function applyPersonalization(response) {
  const hero = document.getElementById("hero-banner");
  const proposition = response?.propositions?.[0];
  const item = proposition?.items?.[0];
  const content = item?.data?.content;
  console.log("FINAL DATA:", content);
  if (!content) {
    hero.innerHTML = "No content returned";
    return null;
  }
  hero.innerHTML = `
<div style="padding:20px;background:#111;color:#fff;border-radius:12px;">
<h2>${content.title}</h2>
<p>${content.message}</p>
<p><b>Code:</b> ${content.offerCode}</p>
<button>${content.cta}</button>
</div>
  `;
  return proposition;
}
 

 
window.addEventListener("load", async () => {

  try {

    await alloy("configure", {

      datastreamId: "9788be4b-6d69-444b-92e7-481021ea9c34",

      orgId: "795D95DA5745973C7F000101@AdobeOrg",

      debugEnabled: true

    });

   const response = await alloy("sendEvent", {
renderDecisions: true,
personalization: {
surfaces: [surface]
},
xdm: {
identityMap: {
crmId: [
{
id: "C3001", // test user
authenticatedState: "authenticated",
primary: true
}
]
}
}
});
 
    const proposition = applyPersonalization(response);
 
    if (proposition) {

      await sendDisplayEvent(proposition);

    }
 
  } catch (e) {

    console.error("Error:", e);

  }

});
</script>
 
</body>
</html>
