<!DOCTYPE html>
<html lang="en">
 
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dr Adobe Learning</title>
 
  <!-- Adobe Web SDK base code -->
<script>
    !function(n,o){o.forEach(function(o){n[o]||((n.__alloyNS=n.__alloyNS||[]).push(o),n[o]=function(){var u=arguments;return new Promise(function(i,l){n.setTimeout(function(){n[o].q.push([i,l,u])})})},n[o].q=[])})}(window,["alloy"]);
</script>
 
  <!-- Adobe Web SDK library -->
<script src="https://cdn1.adoberesources.net/alloy/2.19.1/alloy.js" async></script>
 
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f5f5;
    }
 
    .page {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
 
    #hero-banner {
      margin-top: 20px;
      padding: 24px;
      border: 2px dashed #999;
      border-radius: 12px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
      background: #fafafa;
    }
</style>
</head>
 
<body>
 
  <div class="page">
<h1>Dr Adobe Learning</h1>
<p>This page is ready for an AJO code-based experience surface.</p>
 
    <!-- Surface -->
<div id="hero-banner">Default Hero Banner Content</div>
</div>
 
  <script>
    const surface = "web://karthiknagaraju.github.io/karthik-adobe-learning/#hero-banner";
 
    function sendDisplayEvent(proposition) {
      const { id, scope, scopeDetails = {} } = proposition;
 
      return alloy("sendEvent", {
        xdm: {
          eventType: "decisioning.propositionDisplay",
          _experience: {
            decisioning: {
              propositions: [
                {
                  id,
                  scope,
                  scopeDetails
                }
              ]
            }
          }
        }
      });
    }
 
    function applyPersonalization(response) {
      const hero = document.getElementById("hero-banner");
      if (!hero) return [];
 
      const propositions = response?.propositions || [];
      const rendered = [];
 
      for (const proposition of propositions) {
        const items = proposition.items || [];
 
        const htmlItem = items.find(item =>
          item.schema === "https://ns.adobe.com/personalization/html-content-item" ||
          Boolean(item.data?.content)
        );
 
        if (htmlItem) {
          const content = htmlItem.data?.content || htmlItem.content || "";
 
          if (content) {
            hero.innerHTML = content;
            rendered.push(proposition);
            break;
          }
        }
      }
 
      return rendered;
    }
 
    window.addEventListener("load", async () => {
      try {
        await alloy("configure", {
          datastreamId: "9788be4b-6d69-444b-92e7-481021ea9c34",
          orgId: "795D95DA5745973C7F000101@AdobeOrg",
          debugEnabled: true
        });
 
        const response = await alloy("sendEvent", {
          renderDecisions: true,
          personalization: {
            surfaces: [surface],
            sendDisplayEvent: false
          },
          xdm: {
            web: {
              webPageDetails: {
                name: "home",
                URL: window.location.href
              }
            }
          }
        });
 
        const renderedPropositions = applyPersonalization(response);
 
        for (const proposition of renderedPropositions) {
          await sendDisplayEvent(proposition);
        }
 
      } catch (error) {
        console.error("Web SDK error:", error);
      }
    });
</script>
 
</body>
</html>
